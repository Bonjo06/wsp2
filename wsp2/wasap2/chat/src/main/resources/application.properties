spring.application.name=chat

# Configuración de Servidor y Concurrencia (Requisito No Funcional: Escalabilidad)
server.port=${PORT:8080}
server.tomcat.threads.max=${MAX_THREADS:200}
server.tomcat.threads.min-spare=${MIN_THREADS:20}

# H2 Database configuration con Variables de Entorno
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true